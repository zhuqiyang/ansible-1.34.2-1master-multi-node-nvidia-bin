---
- name: 检查container_runtime是否已安装
  stat:
    path: /root/.state/container-runtimeok
  register: container_runtimeok_result
  no_log: true

- name: container-runtime已安装
  debug:
    msg: container-runtime已安装
  when: container_runtimeok_result.stat.exists

- name: 安装docker
  include_tasks: install-docker.yml
  when: not container_runtimeok_result.stat.exists and container_runtime == 'docker'

- name: 检查是否有显卡
  shell: |
    if lspci | grep -i 'NVIDIA' > /dev/null; then
      echo '有显卡'
    else
      echo '没有显卡'
    fi
  register: lspci_result

- name: 打印lspci结果
  debug:
    var: lspci_result.stdout

- name: 确定 containerd 安装任务文件
  set_fact:
    containerd_install_file: "{{ 'install-containerd-nvidia.yml' if lspci_result.stdout == '有显卡' and (nvidia_device_plugin_enabled | bool) else 'install-containerd.yml' }}"
  when: >
    not container_runtimeok_result.stat.exists
    and container_runtime == 'containerd'

- name: 安装 containerd（按是否有显卡与 nvidia_device_plugin_enabled 变量决定执行哪个任务文件）
  include_tasks:
    file: "{{ containerd_install_file }}"
  when: >
    not container_runtimeok_result.stat.exists
    and container_runtime == 'containerd'